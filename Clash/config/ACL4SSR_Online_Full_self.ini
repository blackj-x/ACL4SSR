;不要随意改变关键字，否则会导致出错
;acl4SSR规则

;去广告：支持
;自动测速：支持
;微软分流：支持
;苹果分流：支持
;增强中国IP段：支持
;增强国外GFW：支持

; --- ios_rule_script 聚合规则集成 (fresher updates) ---
; 从 https://github.com/blackmatrix7/ios_rule_script 提取 Global / GlobalMedia / Mainland (ChinaMaxNoMedia) 等聚合文件
; 置于本项目 Clash/ 下供自用。定期可重新同步上游。
; Global ~34k 行：广泛国外域名/关键词/IP（GFW + 国际站），适合节点选择
; GlobalMedia ~2k 行：全球流媒体、AI、Copilot 等，适合国外媒体组（可再按 US/JP/HK 细分节点）
; Mainland ~125k 行：国内域名+IP 综合（NoMedia 版），适合全球直连（文件较大，酌情使用更轻量的 China.list）
; 另同步了 Bahamut/AbemaTV/ViuTV/HuluJP/USMedia/Netflix 等区域媒体列表（小体积），便于按地区拆分 GlobalMedia
; 推荐引用方式：使用你 fork (gouzhiyuan/ACL4SSR) 的 raw URL，便于你自定义修改
; 如需更细致拆分，可在具体 Netflix/YouTube/Bahamut 之后插入区域列表，再跟 GlobalMedia/Global
; ----------------------

